<style>
  :root{
    --ink:#16202e; --paper:#ffffff; --panel:#f5f7f9; --line:#e3e7ec; --muted:#6b7684;
    --accent:#1f6f5c; --accent-ink:#0f4437;
    --sales:#14713b; --sales-bg:#ecf6f0;
    --cost:#a8551a; --cost-bg:#fbf1e6;
    --profit:#1f5fa8; --profit-bg:#eaf1fb;
    --danger:#b23b3b;
    --radius:10px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--panel);color:var(--ink);
    font-family:"IBM Plex Sans KR",system-ui,sans-serif;font-size:14px;line-height:1.5}
  .mono{font-family:"IBM Plex Mono","IBM Plex Sans KR",monospace;font-variant-numeric:tabular-nums}
  .wrap{max-width:1180px;margin:0 auto;padding:20px 18px 80px}

  header.app{display:flex;flex-wrap:wrap;align-items:flex-end;gap:14px 22px;
    padding-bottom:16px;border-bottom:2px solid var(--ink)}
  .brand h1{margin:0;font-size:21px;font-weight:600;letter-spacing:-.01em}
  .brand p{margin:3px 0 0;color:var(--muted);font-size:12.5px}
  .head-ctrl{display:flex;align-items:center;gap:10px;margin-left:auto;flex-wrap:wrap}
  .month-box{display:flex;align-items:center;gap:8px;background:var(--paper);
    border:1px solid var(--line);border-radius:var(--radius);padding:7px 11px}
  .month-box label{font-size:11.5px;color:var(--muted);font-weight:500}
  input[type=month]{border:none;background:transparent;font:inherit;color:inherit;outline:none}
  .save-stat{font-size:12px;color:var(--muted);min-width:74px}
  .save-stat.ok{color:var(--sales)}
  .save-stat.err{color:var(--danger)}

  button{font:inherit;cursor:pointer;border-radius:8px;border:1px solid var(--line);
    background:var(--paper);color:var(--ink);padding:7px 13px;transition:.12s}
  button:hover{border-color:#c3cad3}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  button.primary:hover{background:var(--accent-ink)}
  button.ghost{background:transparent}
  button.mini{padding:3px 9px;font-size:12.5px}
  button.del{color:var(--danger);border-color:transparent;background:transparent;padding:4px 7px}
  button.del:hover{background:#fbeaea}

  nav.tabs{display:flex;gap:2px;margin:18px 0 16px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .tab{background:none;border:none;border-bottom:2px solid transparent;border-radius:0;
    padding:9px 15px;color:var(--muted);font-weight:500}
  .tab:hover{color:var(--ink)}
  .tab.on{color:var(--accent-ink);border-bottom-color:var(--accent)}

  section.panel{display:none}
  section.panel.on{display:block;animation:fade .18s ease}
  @keyframes fade{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}

  .card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
    overflow:hidden;margin-bottom:16px}
  .card-h{display:flex;align-items:center;gap:10px;padding:12px 15px;border-bottom:1px solid var(--line)}
  .card-h h2{margin:0;font-size:14.5px;font-weight:600}
  .card-h .hint{color:var(--muted);font-size:12px;font-weight:400}
  .card-h .sp{margin-left:auto}

  .scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:640px}
  th,td{padding:8px 10px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap}
  th{background:var(--panel);color:var(--muted);font-weight:500;font-size:11.5px;
    letter-spacing:.02em;position:sticky;top:0}
  th.l,td.l{text-align:left}
  td.calc{color:#33404f;background:#fbfcfd}
  td.profit{color:var(--profit);font-weight:500}
  tbody tr:hover td{background:#f3f8f6}
  tbody tr:hover td.calc{background:#eef6f2}
  tfoot td{font-weight:600;border-top:2px solid var(--ink);border-bottom:none;background:#fff}

  td input,td select{width:100%;border:1px solid transparent;background:transparent;
    font:inherit;color:inherit;padding:4px 6px;border-radius:6px;text-align:right;outline:none}
  td.l input,td.l select{text-align:left}
  td.l select{min-width:118px;padding-right:22px;text-overflow:ellipsis}
  td input.vno{min-width:66px}
  .scroll td.end,.scroll th.end{position:sticky;right:0;background:var(--paper);
    box-shadow:-7px 0 7px -7px rgba(0,0,0,.15);z-index:2;text-align:center}
  .scroll th.end{background:var(--panel)}
  .scroll tfoot td.end{background:#fff;border-top:2px solid var(--ink)}
  tbody tr:hover td.end{background:#f3f8f6}
  table.dense{min-width:0;font-size:12px}

<script>
const KRW = n => (Math.round(n)||0).toLocaleString('ko-KR');
const $ = s => document.querySelector(s);

/* ---------- persistence ---------- */
/* ---------- persistence: 메모리 DB + 최선노력 브라우저 저장 + 파일 백업 ---------- */
function lsGet(key){ try{ const v=localStorage.getItem(key); return v?JSON.parse(v):null; }catch(e){ return null; } }
function lsSet(key,val){ try{ localStorage.setItem(key, JSON.stringify(val)); return true; }catch(e){ return false; } }

/* 개별 문서 저장: 설정(config) + 월별(m_YYYY-MM) 로 분리 */
async function docGet(id){
  if(fsCol){ try{ const s=await fsCol.doc(id).get(); return (s.exists && s.data() && s.data().json)?JSON.parse(s.data().json):null; }catch(e){ console.error(e); } }
  try{ if(window.storage){ const r=await window.storage.get('doc_'+id,false); return r?JSON.parse(r.value):null; } }catch(e){}
  return lsGet('doc_'+id);
}
async function docSet(id, obj){
  const json=JSON.stringify(obj);
  if(fsCol){ try{ await fsCol.doc(id).set({json, updated:Date.now()}); storageOK=true; setSaved(); return true; }catch(e){ console.error(e); } }
  try{ if(window.storage){ await window.storage.set('doc_'+id, json, false); storageOK=true; setSaved(); return true; } }catch(e){}
  if(lsSet('doc_'+id, obj)){ storageOK=true; setSaved(); return true; }
  storageOK=false; setDirty(); return false;
}
/* 구버전(단일 문서) 데이터 읽기 — 마이그레이션용 */
async function legacyGet(){
  if(fsCol){ try{ const s=await fsCol.doc('main').get(); if(s.exists && s.data() && s.data().json) return JSON.parse(s.data().json); }catch(e){} }
  try{ if(window.storage){ const r=await window.storage.get('db',false); if(r) return JSON.parse(r.value); } }catch(e){}
  return lsGet('db');
}

function configObj(){ return { rates:DB.rates, vehicles:DB.vehicles, typeCleared:DB.typeCleared }; }
function persistConfig(){ return docSet('config', configObj()); }
function persistMonth(m){ if(!m) return Promise.resolve(); return docSet('m_'+m, DB.months[m]||{rows:[],detail:[]}); }
let cfgTimer, monTimer, storageOK=false;
function scheduleConfig(){ clearTimeout(cfgTimer); cfgTimer=setTimeout(persistConfig,400); }
function scheduleMonth(){ clearTimeout(monTimer); monTimer=setTimeout(()=>persistMonth(month),400); }
function setSaved(){
  const el=$('#saveStat'); if(!el) return;
  const d=new Date(), hh=String(d.getHours()).padStart(2,'0'), mm=String(d.getMinutes()).padStart(2,'0');
  el.textContent='자동 저장됨 '+hh+':'+mm; el.className='save-stat ok';
}
function setDirty(){
  const el=$('#saveStat'); if(el){ el.textContent='브라우저 저장 불가 — 백업 파일로 저장하세요'; el.className='save-stat err'; }
}
let toastT;
function toast(msg){
  const t=$('#toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1800);
}

/* ---------- defaults (원본 양식 값) ---------- */
const DEFAULT_CODES = [
  {code:'F',  label:'신평-녹산 전일',    short:'전일'},
  {code:'H',  label:'신평-녹산 반일',    short:'반일'},
  {code:'8',  label:'NRC·범천-녹산 전일', short:'전일'},
  {code:'5',  label:'NRC·범천-녹산 반일', short:'반일'},
  {code:'O',  label:'NRC-녹산 1회',      short:'1회'},
  {code:'11', label:'범천-녹산 11hr',    short:'11hr'},
  {code:'1',  label:'범천-녹산 1회',      short:'1회'},
  {code:'A',  label:'녹산-녹산 전일',    short:'전일'},
  {code:'B',  label:'녹산-녹산 반일',    short:'반일'},
  {code:'G',  label:'구평-녹산 1회',      short:'1회'},
];
/* 경로 → 해당 경로에서 선택 가능한 운행안 (원본 참조표 기준) */
const ROUTE_CODES = {
  '신평→녹산':['F','H'],
  'NRC→녹산':['8','5','O'],
  '범천→녹산':['8','5','11','1'],
  '녹산→녹산':['A','B'],
  '구평→녹산':['G'],
};
/* 차량번호 마스터 — 원본 엑셀에서 그대로 등록 (65대) */
const DEFAULT_VEHICLES = [
{no:"1215",full:"경남81아1215",type:""},{no:"1328",full:"부산96아1328",type:""},{no:"1507",full:"부산96아1507",type:""},{no:"1589",full:"부산96아1589",type:""},{no:"1608",full:"부산91아1608",type:""},{no:"1704",full:"부산96아1704",type:""},{no:"1889",full:"부산91아1889",type:""},{no:"1931",full:"부산94아1931",type:""},{no:"1932",full:"부산96아1932",type:""},{no:"2223",full:"경북84아2223",type:""},{no:"2689",full:"경남81아2689",type:""},{no:"2755",full:"경남83아2755",type:""},{no:"2821",full:"경남82아2821",type:""},{no:"2925",full:"경남82아2925",type:""},{no:"2938",full:"부산95아2938",type:""},{no:"2951",full:"경남82아2951",type:""},{no:"3013",full:"부산95아3013",type:""},{no:"3028",full:"부산91아3028",type:""},{no:"3190",full:"부산96아3190",type:""},{no:"3210",full:"경남82아3210",type:""},{no:"3257",full:"경남83사3257",type:""},{no:"3263",full:"경남83사3263",type:""},{no:"3274",full:"경남83사3274",type:""},{no:"3547",full:"부산94아3547",type:""},{no:"3635",full:"경남82아3635",type:""},{no:"3790",full:"경기85사3790",type:""},{no:"4042",full:"부산94아4042",type:""},{no:"4313",full:"부산94아4313",type:""},{no:"4340",full:"경남81아4340",type:""},{no:"4706",full:"경남82아4706",type:""},{no:"5047",full:"부산95아5047",type:""},{no:"5058",full:"경남80사5058",type:""},{no:"5109",full:"전남84바5109",type:""},{no:"5131",full:"경남81사5131",type:""},{no:"5143",full:"경남82사5143",type:""},{no:"5442",full:"부산94아5442",type:""},{no:"5822",full:"인천80자5822",type:""},{no:"5843",full:"부산93아5843",type:""},{no:"5921",full:"경남81아5921",type:""},{no:"5922",full:"부산93아5922",type:""},{no:"6438",full:"경남82아6438",type:""},{no:"6646",full:"경남81사6646",type:""},{no:"6769",full:"경남80사6769",type:""},{no:"6806",full:"부산90아6806",type:""},{no:"6810",full:"경북87아6810",type:""},{no:"7072",full:"부산92아7072",type:""},{no:"7117",full:"경남82사7117",type:""},{no:"7236",full:"경남82아7236",type:""},{no:"7263",full:"경북81아7263",type:""},{no:"7270",full:"경남81아7270",type:""},{no:"7286",full:"부산92아7286",type:""},{no:"7287",full:"부산92아7287",type:""},{no:"7381",full:"울산80아7381",type:""},{no:"7397",full:"부산95아7397",type:""},{no:"7520",full:"경남81사7520",type:""},{no:"7857",full:"경남81사7857",type:""},{no:"8056",full:"부산93아8056",type:""},{no:"8150",full:"부산93아8150",type:""},{no:"8609",full:"경북86아8609",type:""},{no:"9316",full:"부산80아9316",type:""},{no:"9450",full:"부산94아9450",type:""},{no:"4654",full:"경북86아4654",type:""},{no:"7482",full:"경남82아7482",type:""},{no:"9160",full:"경북80아9160",type:""},{no:"9451",full:"경남92아9451",type:""}
];
const DEFAULT_RATES = {
  toll: 6200,
  codes: DEFAULT_CODES,
  sales:    {F:371000,H:212000,O:111000,'8':403000,'5':286000,'11':551000,'1':58000,A:403000,B:286000,G:170000},
  purchase: {F:349800,H:201400,O:106000,'8':381600,'5':265000,'11':530000,'1':53000,A:349800,B:201400,G:160000},
};
const ROUTES = ['신평→녹산','NRC→녹산','녹산→녹산','범천→녹산','구평→녹산'];

/* ---------- state ---------- */
let DB = { rates:null, vehicles:[], months:{} };
let rates, vehicles, rows, detail, month, activeTab='transport';
function ensureMonth(m){ if(!DB.months[m]) DB.months[m]={rows:[],detail:[]}; return DB.months[m]; }

/* ---------- calc ---------- */
function calcParts(code,cnt){
  const R=Math.round;
  const sRate=rates.sales[code]||0, pRate=rates.purchase[code]||0;
  const sSupply=sRate*cnt, pSupply=pRate*cnt;
  const times = code==='F'?cnt*4 : code==='H'?cnt*2 : 0;
  const tollSupply=rates.toll*times;
  return {sSupply, sVat:R(sSupply*.1), sTot:R(sSupply*1.1),
          pSupply, pVat:R(pSupply*.1), pTot:R(pSupply*1.1),
          times, tollSupply, tollVat:R(tollSupply*.1), tollTot:R(tollSupply*1.1)};
}
function calcRow(r){ return calcParts(r.code, +r.count||0); }   // 운송입력: 차량 수 만큼
function calcDet(r){ return calcParts(r.code, 1); }             // 차량운행내역: 1행 = 1대
function vmapNow(){ return Object.fromEntries(vehicles.map(v=>[String(v.no).trim(), v.full])); }
function totals(){
  let sSupply=0,pSupply=0,tollSupply=0,times=0;
  rows.forEach(r=>{const c=calcRow(r); sSupply+=c.sSupply; pSupply+=c.pSupply; tollSupply+=c.tollSupply; times+=c.times;});
  const salesSupply=sSupply+tollSupply, costSupply=pSupply+tollSupply;
  const profit=salesSupply-costSupply;
  return {sSupply,pSupply,tollSupply,times,salesSupply,costSupply,profit,
          salesVat:salesSupply*.1, salesTot:salesSupply*1.1,
          costVat:costSupply*.1, costTot:costSupply*1.1,
          margin: salesSupply? profit/salesSupply : 0};
}

/* ---------- renderers ---------- */
function codeOptions(sel, route){
  const allowed = ROUTE_CODES[route];
  const list = allowed ? rates.codes.filter(c=>allowed.includes(c.code)) : rates.codes;
  const opts = list.map(c=>{const lbl = route ? `${c.code} · ${c.short||c.label}` : `${c.code} · ${c.label}`;
    return `<option value="${c.code}" ${c.code===sel?'selected':''}>${lbl}</option>`;}).join('');
  return `<option value="">${route?'운행안 선택':'경로 먼저 선택'}</option>` + opts;
}
function routeOptions(sel){
  return `<option value="">경로 선택</option>` + ROUTES.map(r=>`<option ${r===sel?'selected':''}>${r}</option>`).join('');
}

function renderTransport(){
  const t=totals();
  const body = rows.length ? rows.map((r,i)=>{
    const c=calcRow(r);
    return `<tr>
      <td class="l"><input type="date" value="${r.date||''}" data-i="${i}" data-f="date"></td>
      <td class="l"><select data-i="${i}" data-f="route">${routeOptions(r.route)}</select></td>
      <td><input type="number" min="0" value="${r.count??''}" data-i="${i}" data-f="count" placeholder="0"></td>
      <td class="l"><select data-i="${i}" data-f="code">${codeOptions(r.code, r.route)}</select></td>
      <td class="calc mono">${KRW(c.sSupply)}</td>
      <td class="calc mono">${KRW(c.sVat)}</td>
      <td class="calc mono">${KRW(c.sTot)}</td>
      <td class="calc mono">${c.times}</td>
      <td class="calc mono">${KRW(c.tollSupply)}</td>
      <td class="calc mono">${KRW(c.tollVat)}</td>
      <td class="calc mono">${KRW(c.tollTot)}</td>
      <td><button class="del" data-del="${i}" title="행 삭제">✕</button></td>
    </tr>`;
  }).join('') : `<tr><td colspan="12" class="empty">아직 입력된 운행이 없습니다. 아래 “행 추가”로 시작하세요.</td></tr>`;

  return `
  <div class="sum-grid">
    <div class="sum s-sales"><h3>매출 (청구)</h3>
      <div class="big mono">₩${KRW(t.salesTot)}</div>
      <div class="lines">
        <div><span>공급가액</span><span class="mono">${KRW(t.salesSupply)}</span></div>
        <div><span>부가세</span><span class="mono">${KRW(t.salesVat)}</span></div>
      </div></div>
    <div class="sum s-cost"><h3>매입 (지급)</h3>
      <div class="big mono">₩${KRW(t.costTot)}</div>
      <div class="lines">
        <div><span>공급가액</span><span class="mono">${KRW(t.costSupply)}</span></div>
        <div><span>부가세</span><span class="mono">${KRW(t.costVat)}</span></div>
      </div></div>
    <div class="sum s-profit"><h3>이익</h3>
      <div class="big mono">₩${KRW(t.profit)}</div>
      <div class="lines">
        <div><span>이익율</span><span class="rate-badge">${(t.margin*100).toFixed(1)}%</span></div>
        <div><span>통행료(공급가)</span><span class="mono">${KRW(t.tollSupply)}</span></div>
      </div></div>
  </div>

  <div class="card">
    <div class="card-h"><h2>이적 내역</h2>
      <span class="hint">차량 수 · 운행안만 입력하면 나머지는 자동 계산됩니다</span></div>
    <div class="scroll">
      <table>
        <thead><tr>

let closingFilter={from:'',to:'',route:'',vnos:[],code:''};
let closeOutsideHandler=null;
function closingVnoList(){

  return [...seen.entries()].sort((a,b)=>a[0].localeCompare(b[0],'ko',{numeric:true}));
}
function renderClosing(){
  const rOpts = `<option value="">전체</option>`+ROUTES.map(r=>`<option>${r}</option>`).join('');
  const cOpts = `<option value="">전체</option>`+rates.codes.map(c=>`<option value="${c.code}">${c.code} · ${c.short||c.label}</option>`).join('');

          <div class="vno-panel-h">

        </div>

    </div>

      <thead><tr>

        <th class="l">운행안</th><th>공급가액</th><th>도로비</th><th>합계</th>
      </tr></thead>
      <tbody id="closingBody"></tbody>
      <tfoot id="closingFoot"></tfoot>
    </table></div>
  </div>`;

function applyClosingFilter(){
  const f=closingFilter, vmap=vmapNow();
  const list=detail.map(r=>{
    const c=calcDet(r); const full=vmap[String(r.vno||'').trim()]||'';
    return {date:r.date||'',route:r.route||'',vno:r.vno||'',full,code:r.code||'',
            pSupply:c.pSupply,toll:c.tollSupply,sum:c.pSupply+c.tollSupply};
  }).filter(x=>{
    if(f.from && (!x.date || x.date<f.from)) return false;
    if(f.to && (!x.date || x.date>f.to)) return false;
    if(f.route && x.route!==f.route) return false;
    if(f.code && String(x.code)!==String(f.code)) return false;
    if(f.vnos && f.vnos.length && !f.vnos.includes(String(x.vno).trim())) return false;
    return true;
  });
  let tP=0,tT=0,tS=0;
  const body=list.length? list.map(x=>{ tP+=x.pSupply; tT+=x.toll; tS+=x.sum;
    return `<tr>
      <td class="l">${x.date}</td><td class="l">${x.route}</td><td class="l mono">${x.vno}</td>
      <td class="l">${x.full||'<span class="note">미등록</span>'}</td><td class="l mono">${x.code}</td>
      <td class="mono">${KRW(x.pSupply)}</td><td class="mono">${KRW(x.toll)}</td>
      <td class="mono" style="font-weight:600">${KRW(x.sum)}</td></tr>`;
  }).join('') : `<tr><td colspan="8" class="empty">표시할 데이터가 없습니다.</td></tr>`;
  const bodyEl=$('#closingBody'); if(!bodyEl) return;
  bodyEl.innerHTML=body;
  $('#closingFoot').innerHTML=`<tr>
    <td class="l" colspan="5">합계 (${list.length}건)</td>
    <td class="mono">${KRW(tP)}</td><td class="mono">${KRW(tT)}</td><td class="mono">${KRW(tS)}</td></tr>`;
  $('#closingCount').textContent=`${list.length} / ${detail.length}건`;
}

/* ---------- mount + events ---------- */
function render(){
  const el=$('#app');
  el.innerHTML = activeTab==='transport'?renderTransport()
    : activeTab==='rates'?renderRates()
    : activeTab==='vehicles'?renderVehicles()
    : activeTab==='closing'?renderClosing()
    : renderDetail();
  bind();
}
function bind(){
  if(activeTab==='transport'){
    $('#addRow').onclick=()=>{ rows.push({date:'',route:'',count:'',code:''}); persistRows(); render(); };
    $('#app').oninput = e=>{
      const t=e.target, i=t.dataset.i;
      if(i==null) return;
      const f=t.dataset.f; rows[i][f]=t.value;
      scheduleRows();
      if(f==='count'){ render(); focusBack(i,f); }
    };
    $('#app').onchange = e=>{
      const t=e.target, i=t.dataset.i; if(i==null) return;
      const f=t.dataset.f;
      if(f==='route'){
        rows[i].route=t.value;
        const ok=ROUTE_CODES[t.value];
        if(!ok || !ok.includes(rows[i].code)) rows[i].code = ok ? '' : rows[i].code;
        persistRows(); render();
      } else if(f==='code'){ rows[i].code=t.value; persistRows(); render(); }
    };
    $('#app').onclick = e=>{
      const d=e.target.dataset.del; if(d!=null){ rows.splice(+d,1); persistRows(); render(); }
    };
  }
  if(activeTab==='rates'){
    const digits=s=>+String(s).replace(/[^0-9]/g,'')||0;
    const updDiff=(code,row)=>{ const d=row&&row.querySelector('.profit');
      if(d) d.textContent=KRW((rates.sales[code]||0)-(rates.purchase[code]||0)); };
    $('#tollInput').oninput=e=>{ rates.toll=digits(e.target.value); scheduleConfig(); };
    $('#tollInput').onblur=e=>{ e.target.value=KRW(rates.toll); };
    $('#app').oninput=e=>{ const t=e.target; if(!t.dataset.rate) return;
      rates[t.dataset.rate][t.dataset.code]=digits(t.value); updDiff(t.dataset.code, t.closest('tr')); scheduleConfig(); };
    $('#app').onfocusout=e=>{ const t=e.target; if(!t.dataset.rate) return;
      t.value=KRW(rates[t.dataset.rate][t.dataset.code]||0); };
  }
  if(activeTab==='vehicles'){
    $('#addVeh').onclick=()=>{ vehicles.push({no:'',full:'',type:''}); saveVeh(); render(); };
    $('#seedVeh').onclick=()=>{
      const have=new Set(vehicles.map(v=>String(v.no).trim()));
      let added=0;
      DEFAULT_VEHICLES.forEach(v=>{ if(!have.has(v.no)){ vehicles.push({...v}); added++; } });
      saveVeh(); render(); toast(added? added+'대 추가됨':'이미 모두 등록되어 있습니다');
    };
    $('#app').oninput=e=>{ const i=e.target.dataset.i; if(i==null)return;
      vehicles[i][e.target.dataset.vf]=e.target.value; scheduleVeh(); };
    $('#app').onclick=e=>{ const d=e.target.dataset.vdel; if(d!=null){ vehicles.splice(+d,1); saveVeh(); render(); } };
  }
  if(activeTab==='detail'){
    $('#addDet').onclick=()=>{ detail.push({date:'',route:'',vno:'',code:''}); persistDetail(); render(); };
    $('#app').oninput=e=>{ const i=e.target.dataset.i; if(i==null)return;
      const f=e.target.dataset.df; detail[i][f]=e.target.value;
      scheduleDetail();
      if(f==='vno'){
        const full=vmapNow()[String(e.target.value||'').trim()]||'';
        const cell=document.querySelector(`[data-full="${i}"]`);
        if(cell) cell.innerHTML = full || '<span class="note">미등록</span>';
      } };
    $('#app').onchange=e=>{ const i=e.target.dataset.i; if(i==null)return;
      const f=e.target.dataset.df;
      if(f==='route'){ detail[i].route=e.target.value;
        const ok=ROUTE_CODES[e.target.value];
        if(!ok || !ok.includes(detail[i].code)) detail[i].code = ok ? '' : detail[i].code;
        persistDetail(); render(); }
      else if(f==='code'){ detail[i].code=e.target.value; persistDetail(); render(); } };
    $('#app').onclick=e=>{ const d=e.target.dataset.ddel; if(d!=null){ detail.splice(+d,1); persistDetail(); render(); } };
  }
  if(activeTab==='closing'){
    $('#fFrom').value=closingFilter.from; $('#fTo').value=closingFilter.to;
    $('#fRoute').value=closingFilter.route; $('#fCode').value=closingFilter.code;
    const upd=()=>{ closingFilter.from=$('#fFrom').value; closingFilter.to=$('#fTo').value;
      closingFilter.route=$('#fRoute').value; closingFilter.code=$('#fCode').value; applyClosingFilter(); };
    ['fFrom','fTo','fRoute','fCode'].forEach(id=>$('#'+id).onchange=upd);
    const btn=$('#fVnoBtn'), panel=$('#fVnoPanel');
    const syncBtn=()=>{ btn.textContent = closingFilter.vnos.length? `차량번호 ${closingFilter.vnos.length}대 ▾`:'차량번호 전체 ▾'; };
    btn.onclick=e=>{ e.stopPropagation(); panel.hidden=!panel.hidden; };
    panel.onclick=e=>e.stopPropagation();
    $('#fVnoList').onchange=e=>{ if(e.target.type!=='checkbox')return;
      const v=e.target.value;
      if(e.target.checked){ if(!closingFilter.vnos.includes(v)) closingFilter.vnos.push(v); }
      else closingFilter.vnos=closingFilter.vnos.filter(x=>x!==v);
      syncBtn(); applyClosingFilter(); };
    $('#fVnoAll').onclick=()=>{ closingFilter.vnos=closingVnoList().map(x=>x[0]);
      $('#fVnoList').querySelectorAll('input').forEach(i=>i.checked=true); syncBtn(); applyClosingFilter(); };
    $('#fVnoNone').onclick=()=>{ closingFilter.vnos=[];
      $('#fVnoList').querySelectorAll('input').forEach(i=>i.checked=false); syncBtn(); applyClosingFilter(); };
    $('#fReset').onclick=()=>{ closingFilter={from:'',to:'',route:'',code:'',vnos:[]};
      ['fFrom','fTo','fRoute','fCode'].forEach(id=>$('#'+id).value='');
      $('#fVnoList').querySelectorAll('input').forEach(i=>i.checked=false); syncBtn(); applyClosingFilter(); };
    if(closeOutsideHandler) document.removeEventListener('click', closeOutsideHandler);
    closeOutsideHandler=ev=>{ const p=$('#fVnoPanel'); if(!p) return;
      const wrap=p.closest('.vno-filter'); if(wrap && !wrap.contains(ev.target)) p.hidden=true; };
    document.addEventListener('click', closeOutsideHandler);
    applyClosingFilter();
  }
}
function focusBack(i,f){ const el=document.querySelector(`[data-i="${i}"][data-f="${f}"]`); if(el){el.focus();} }
function focusBack2(i,f){ const el=document.querySelector(`[data-i="${i}"][data-df="${f}"]`); if(el){el.focus();} }

/* debounced saves — 월 데이터는 월 문서, 단가/차량은 설정 문서로 분리 저장 */
const scheduleRows   = scheduleMonth;
const scheduleDetail = scheduleMonth;
const scheduleVeh    = scheduleConfig;
const scheduleRates  = ()=>{ scheduleConfig(); clearTimeout(rrT); rrT=setTimeout(()=>{ if(activeTab==='rates') render(); },400); };
let rrT;
const persistRows    = ()=>persistMonth(month);
const persistDetail  = ()=>persistMonth(month);
const saveRates      = persistConfig;
const saveVeh        = persistConfig;

/* ---------- month + tabs + export ---------- */
function saveAll(){ return Promise.all([persistConfig(), persistMonth(month)]); }
async function loadMonth(m){
  month=m;
  if(!DB.months[m]){
    const md = await docGet('m_'+m);
    DB.months[m] = (md && typeof md==='object') ? {rows:md.rows||[], detail:md.detail||[]} : {rows:[],detail:[]};
  }
  const mo=DB.months[m]; rows=mo.rows; detail=mo.detail; render();
}
async function loadAllMonths(){
  if(fsCol){ try{ const snap=await fsCol.get(); snap.forEach(d=>{ if(d.id.indexOf('m_')===0 && d.data().json){ DB.months[d.id.slice(2)]=JSON.parse(d.data().json); } }); }catch(e){ console.error(e); } return; }
  try{ if(window.storage && window.storage.list){ const r=await window.storage.list('doc_m_'); (r&&r.keys||[]).forEach(async k=>{ const g=await window.storage.get(k,false); if(g){ DB.months[k.slice('doc_m_'.length)]=JSON.parse(g.value); } }); return; } }catch(e){}
  try{ for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.indexOf('doc_m_')===0){ DB.months[k.slice(6)]=JSON.parse(localStorage.getItem(k)); } } }catch(e){}
}
/* 파일 백업 / 복원 */
async function downloadBackup(){
  await loadAllMonths();                       // 모든 월을 모아 완전 백업
  const full={ rates:DB.rates, vehicles:DB.vehicles, typeCleared:DB.typeCleared, months:DB.months };
  const blob=new Blob([JSON.stringify(full)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='스크랩운송_백업_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  toast('백업 파일을 저장했습니다');
}
function importBackup(e){
  const f=e.target.files[0]; if(!f){ return; }
  const rd=new FileReader();
  rd.onload=async()=>{
    try{
      const obj=JSON.parse(rd.result);
      if(!obj || typeof obj!=='object' || !obj.months) throw 0;
      DB={ rates:obj.rates||{...DEFAULT_RATES}, vehicles:obj.vehicles||[], typeCleared:obj.typeCleared, months:obj.months||{} };
      DB.rates.codes=DEFAULT_CODES;
      if(!DB.rates.sales) DB.rates.sales={...DEFAULT_RATES.sales};
      if(!DB.rates.purchase) DB.rates.purchase={...DEFAULT_RATES.purchase};
      if(DB.rates.toll==null) DB.rates.toll=DEFAULT_RATES.toll;
      rates=DB.rates; vehicles=DB.vehicles;
      await persistConfig();
      for(const m of Object.keys(DB.months)) await persistMonth(m);
      loadMonth(month||$('#month').value); toast('백업을 불러왔습니다');
    }catch(err){ toast('올바른 백업 파일이 아닙니다'); }
    e.target.value='';
  };
  rd.readAsText(f);
}
function setupTabs(){
  $('#tabs').onclick=e=>{
    const b=e.target.closest('.tab'); if(!b)return;
    document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x===b));
    activeTab=b.dataset.tab; render();
  };
}
function b64ToBuf(b64){
  const bin=atob(b64), len=bin.length, buf=new Uint8Array(len);
  for(let i=0;i<len;i++) buf[i]=bin.charCodeAt(i);
  return buf.buffer;
}
function toDate(s){ if(!s) return null; const p=String(s).split('-'); return p.length===3? new Date(Date.UTC(+p[0],+p[1]-1,+p[2])) : s; }
function numOrStr(v){ return (v!==''&&v!=null&&!isNaN(+v))? +v : (v||null); }
function syncRates(ws, codeCol, rateCol, table){
  for(let r=4;r<=15;r++){
    const code=ws.getRow(r).getCell(codeCol).value;
    if(code===null||code===undefined||code==='') continue;
    if(table[String(code)]!=null) ws.getRow(r).getCell(rateCol).value=table[String(code)];
  }
}
async function exportExcel(){
  if(typeof ExcelJS==='undefined' || typeof TEMPLATE_B64==='undefined'){ exportCSVfallback(); return; }
  try{
    const wb=new ExcelJS.Workbook();
    await wb.xlsx.load(b64ToBuf(TEMPLATE_B64));
    const toll=rates.toll, CAP1=25, CAP2=39;

    // 이적 내용: 입력값(B,C,D,E)만 채움 — 나머지는 원본 수식이 계산
    const ij=wb.getWorksheet('이적 내용');
    for(let k=0;k<CAP1;k++){
      const r=ij.getRow(4+k), row=rows[k];
      if(row){ r.getCell(2).value=toDate(row.date); r.getCell(3).value=row.route||null;
               r.getCell(4).value=(row.count!==''&&row.count!=null)?+row.count:null;
               r.getCell(5).value=numOrStr(row.code); r.getCell(12).value=toll; }
      else { [2,3,4,5].forEach(c=>r.getCell(c).value=null); }
    }
    // 매입 내용: 통행료 단가만 동기화 (본문은 이적에서 수식으로 pull)
    const mi=wb.getWorksheet('매입 내용');
    for(let k=0;k<CAP1;k++) mi.getRow(4+k).getCell(12).value=toll;

    // 매입 차량 운행 내역: 입력값(A,B,C,E)
    const dv=wb.getWorksheet('매입 차량 운행 내역');
    for(let k=0;k<CAP2;k++){
      const r=dv.getRow(4+k), row=detail[k];
      if(row){ r.getCell(1).value=toDate(row.date); r.getCell(2).value=row.route||null;
               r.getCell(3).value=numOrStr(row.vno); r.getCell(5).value=numOrStr(row.code); r.getCell(12).value=toll; }
      else { [1,2,3,5].forEach(c=>r.getCell(c).value=null); }
    }

    // raw data: 차량별 마감 원본 (날짜~매입공급가 + 통행료 도로비, 합계는 수식 H=F+G)
    const rw=wb.getWorksheet('raw data');
    const vmapX=vmapNow();
    for(let k=0;k<CAP2;k++){
      const r=rw.getRow(4+k), row=detail[k];
      if(row){ const c=calcDet(row);
        r.getCell(1).value=toDate(row.date); r.getCell(2).value=row.route||null;
        r.getCell(3).value=numOrStr(row.vno); r.getCell(4).value=vmapX[String(row.vno||'').trim()]||null;
        r.getCell(5).value=numOrStr(row.code); r.getCell(6).value=c.pSupply; r.getCell(7).value=c.tollSupply; }
      else { [1,2,3,4,5,6,7].forEach(c=>r.getCell(c).value=null); }
    }

    // 차량번호 마스터 재작성
    const vh=wb.getWorksheet('차량번호');
    for(let rIdx=2;rIdx<=77;rIdx++){
      const v=vehicles[rIdx-2], r=vh.getRow(rIdx);
      if(v){ r.getCell(1).value=numOrStr(v.no); r.getCell(2).value=v.full||null; r.getCell(3).value=v.type||null; }
      else { [1,2,3].forEach(c=>r.getCell(c).value=null); }
    }

    // 단가표 동기화 (앱에서 단가 수정 시 반영)
    syncRates(ij,22,23,rates.sales);      // 이적 V→W (매출)
    syncRates(mi,22,23,rates.purchase);   // 매입내용 V→W (매입)
    syncRates(dv,21,22,rates.purchase);   // 매입차량 U→V (매입)

    wb.calcProperties.fullCalcOnLoad=true;
    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='스크랩운송내역_'+month+'.xlsx'; a.click();
    toast(((rows.length>CAP1)||(detail.length>CAP2))?'내보냈습니다(양식 최대 행 초과분 제외)':'원본 양식으로 내보냈습니다');
  }catch(err){ console.error(err); exportCSVfallback(); }
}
function exportCSVfallback(){
  const t=totals();
  let out='이적 내용 ('+month+')\n날짜,경로,차량수,운행안,매출공급가,매출부가세,매출합계,통행료횟수,통행료공급가,통행료부가세,통행료합계\n';
  rows.forEach(r=>{const c=calcRow(r);
    out+=[r.date,r.route,r.count,r.code,c.sSupply,c.sVat,c.sTot,c.times,c.tollSupply,c.tollVat,c.tollTot].join(',')+'\n';});
  out+='\n요약\n매출합계,'+t.salesTot+'\n매입합계,'+t.costTot+'\n이익,'+t.profit+'\n';
  const blob=new Blob(['\ufeff'+out],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='스크랩운송_'+month+'.csv'; a.click();
  toast('엑셀 모듈을 불러오지 못해 CSV로 내려받았습니다');
}

/* ---------- Firebase ---------- */
let fsCol=null, appStarted=false;
function fbConfigured(){ return typeof firebase!=='undefined' && firebaseConfig && firebaseConfig.projectId && !/여기에/.test(firebaseConfig.projectId); }
function initFirebase(){
  try{ firebase.initializeApp(firebaseConfig); fsCol=firebase.firestore().collection('scrapTransport'); return true; }
  catch(e){ console.error(e); return false; }
}
function showLogin(){ const g=$('#loginGate'); if(g) g.hidden=false; }
function hideLogin(){ const g=$('#loginGate'); if(g) g.hidden=true; }

/* ---------- 앱 시작 ---------- */
async function loadApp(){
  if(appStarted){ return; } appStarted=true;
  DB = { rates:null, vehicles:[], months:{}, typeCleared:false };
  let cfg = await docGet('config');
  let migrated=false;
  if(cfg==null){                                  // 구버전(단일 문서) 데이터가 있으면 이관
    const old = await legacyGet();
    if(old && typeof old==='object'){
      DB.rates=old.rates; DB.vehicles=old.vehicles||[]; DB.typeCleared=old.typeCleared;
      DB.months = old.months || {};
      cfg = configObj(); migrated=true;
    }
  }
  DB.rates = (cfg && cfg.rates) ? cfg.rates : {...DEFAULT_RATES};
  DB.rates.codes = DEFAULT_CODES;
  if(!DB.rates.sales)    DB.rates.sales={...DEFAULT_RATES.sales};
  if(!DB.rates.purchase) DB.rates.purchase={...DEFAULT_RATES.purchase};
  if(DB.rates.toll==null)DB.rates.toll=DEFAULT_RATES.toll;
  rates=DB.rates;
  DB.vehicles = (cfg && cfg.vehicles && cfg.vehicles.length) ? cfg.vehicles : (DB.vehicles.length?DB.vehicles:DEFAULT_VEHICLES.map(v=>({...v})));
  DB.typeCleared = cfg ? cfg.typeCleared : DB.typeCleared;
  if(!DB.typeCleared){ DB.vehicles.forEach(v=>v.type=''); DB.typeCleared=true; }
  vehicles=DB.vehicles;

  const now=new Date();
  const m=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  $('#month').value=m;
  $('#month').onchange=e=>loadMonth(e.target.value);
  $('#exportBtn').onclick=exportExcel;
  $('#saveBtn').onclick=downloadBackup;
  $('#openBtn').onclick=()=>$('#backupInput').click();
  $('#backupInput').onchange=importBackup;
  document.addEventListener('visibilitychange',()=>{ if(document.hidden) saveAll(); });
  window.addEventListener('pagehide',()=>{ saveAll(); });
  setupTabs();

  if(migrated){                                   // 이관된 데이터를 개별 문서로 저장
    await persistConfig();
    for(const mm of Object.keys(DB.months)) await persistMonth(mm);
  } else {
    persistConfig();                              // 설정 문서 보장(상태표시 갱신)
  }
  loadMonth(m);
}

/* ---------- 부트스트랩: 설정 있으면 Firestore, 없으면 로컬 ---------- */
(function bootstrap(){
  if(fbConfigured()) initFirebase();
  loadApp();
})();
</script>
